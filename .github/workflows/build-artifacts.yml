name: Build Artifacts

# Reusable workflow that builds all charms, rocks, and snaps declared in
# artifacts.yaml and publishes a merged artifacts-generated.yaml as a
# GitHub artifact.
#
# Call from your operator repository:
#
#   jobs:
#     build:
#       uses: javierdelapuente/operator-ci-poc/.github/workflows/build-artifacts.yml@main
#       permissions:
#         contents: read
#         packages: write
#         actions: read   # required for get-workflow-version-action
#
# opcli is installed at the exact commit SHA this workflow was called with,
# resolved via canonical/get-workflow-version-action (workaround for
# https://github.com/actions/toolkit/issues/1264).

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing artifacts.yaml (relative to workspace root)"
        type: string
        default: "."

jobs:
  # ── Job 1: produce the build matrix ────────────────────────────────────────
  build-matrix:
    name: Build matrix
    runs-on: ubuntu-latest
    permissions:
      actions: read  # required by get-workflow-version-action
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      opcli-sha: ${{ steps.workflow-version.outputs.sha }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Get workflow version
        id: workflow-version
        uses: canonical/get-workflow-version-action@v1
        with:
          repository-name: javierdelapuente/operator-ci-poc
          file-name: build-artifacts.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Install opcli
        run: |
          if grep -q 'name = "opcli"' "${GITHUB_WORKSPACE}/pyproject.toml" 2>/dev/null; then
            uv tool install "${GITHUB_WORKSPACE}"
          else
            uv tool install "git+https://github.com/javierdelapuente/operator-ci-poc.git@${{ steps.workflow-version.outputs.sha }}"
          fi

      - name: Generate build matrix
        id: matrix
        run: |
          matrix=$(opcli artifacts matrix)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # ── Job 2: build each artifact in parallel ─────────────────────────────────
  build:
    name: "Build ${{ matrix.type }} ${{ matrix.name }}"
    needs: build-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build-matrix.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Install opcli
        run: |
          if grep -q 'name = "opcli"' "${GITHUB_WORKSPACE}/pyproject.toml" 2>/dev/null; then
            uv tool install "${GITHUB_WORKSPACE}"
          else
            uv tool install "git+https://github.com/javierdelapuente/operator-ci-poc.git@${{ needs.build-matrix.outputs.opcli-sha }}"
          fi

      - name: Install LXD
        run: |
          sudo snap install lxd
          sudo lxd waitready
          sudo lxd init --auto
          sudo usermod -aG lxd $USER
          sudo chmod 0666 /var/snap/lxd/common/lxd/unix.socket
          if sudo iptables -nL DOCKER-USER 2>/dev/null; then
            sudo iptables -I DOCKER-USER -i lxdbr0 -j ACCEPT
            sudo iptables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          fi
          if sudo ip6tables -nL DOCKER-USER 2>/dev/null; then
            sudo ip6tables -I DOCKER-USER -i lxdbr0 -j ACCEPT
            sudo ip6tables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          fi

      - name: Install charmcraft
        if: matrix.type == 'charm'
        run: sudo snap install charmcraft --classic

      - name: Install rockcraft
        if: matrix.type == 'rock'
        run: sudo snap install rockcraft --classic

      - name: Install snapcraft
        if: matrix.type == 'snap'
        run: sudo snap install snapcraft --classic

      - name: Login to GHCR
        if: matrix.type == 'rock'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Build ${{ matrix.type }} ${{ matrix.name }}
        run: opcli artifacts build --${{ matrix.type }} ${{ matrix.name }}

      - name: Upload built ${{ matrix.type }}
        if: matrix.type != 'rock'
        uses: actions/upload-artifact@v4
        with:
          name: built-${{ matrix.type }}-${{ matrix.name }}
          path: ${{ inputs.working-directory }}/**/*.${{ matrix.type }}
          if-no-files-found: error

      - name: Upload partial artifacts-generated.yaml
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-generated-${{ matrix.type }}-${{ matrix.name }}
          path: ${{ inputs.working-directory }}/artifacts-generated.yaml
          if-no-files-found: error

  # ── Job 3: merge all partials into the final artifacts-generated.yaml ───────
  collect:
    name: Collect artifacts
    needs: [build-matrix, build]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Install opcli
        run: |
          if grep -q 'name = "opcli"' "${GITHUB_WORKSPACE}/pyproject.toml" 2>/dev/null; then
            uv tool install "${GITHUB_WORKSPACE}"
          else
            uv tool install "git+https://github.com/javierdelapuente/operator-ci-poc.git@${{ needs.build-matrix.outputs.opcli-sha }}"
          fi

      - name: Download all partial artifacts-generated.yaml files
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-generated-*
          path: ${{ inputs.working-directory }}/partial-artifacts/

      - name: Merge partials
        run: |
          opcli artifacts collect \
            $(find ./partial-artifacts -name "artifacts-generated.yaml" | sort | tr '\n' ' ')

      - name: Upload merged artifacts-generated.yaml
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-generated
          path: ${{ inputs.working-directory }}/artifacts-generated.yaml
          if-no-files-found: error
