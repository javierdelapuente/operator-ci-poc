name: Build Artifacts

# Reusable workflow that builds all charms, rocks, and snaps declared in
# artifacts.yaml and publishes a merged artifacts-generated.yaml as a
# GitHub artifact.
#
# Call from your operator repository:
#
#   jobs:
#     build:
#       uses: javierdelapuente/operator-ci-poc/.github/workflows/build-artifacts.yml@main
#       permissions:
#         contents: read
#         packages: write
#         actions: read   # required for get-workflow-version-action
#
# opcli is installed at the exact commit SHA this workflow was called with,
# resolved via canonical/get-workflow-version-action (a workaround for
# https://github.com/actions/toolkit/issues/1264 — github.workflow_ref always
# refers to the caller's workflow, not this one).
#
# Override with opcli-ref only when calling from the same repository (where
# referenced_workflows is not populated), e.g. in test-build-artifacts.yml.

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing artifacts.yaml (relative to workspace root)"
        type: string
        default: "."
      opcli-ref:
        description: >
          Git ref to install opcli from. Leave empty for external callers
          (auto-resolved via get-workflow-version-action). Must be set
          explicitly when calling from within the same repository (e.g.
          tests), because referenced_workflows is not populated for
          same-repo calls.
        type: string
        default: ""

jobs:
  # ── Job 1: produce the build matrix ────────────────────────────────────────
  build-matrix:
    name: Build matrix
    runs-on: ubuntu-latest
    permissions:
      actions: read  # required by get-workflow-version-action
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      opcli-sha: ${{ inputs.opcli-ref != '' && inputs.opcli-ref || steps.workflow-version.outputs.sha }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Get workflow version
        id: workflow-version
        if: inputs.opcli-ref == ''
        uses: canonical/get-workflow-version-action@v1
        with:
          repository-name: javierdelapuente/operator-ci-poc
          file-name: build-artifacts.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install opcli
        run: |
          uv tool install "git+https://github.com/javierdelapuente/operator-ci-poc.git@${{ inputs.opcli-ref != '' && inputs.opcli-ref || steps.workflow-version.outputs.sha }}"

      - name: Generate build matrix
        id: matrix
        run: |
          matrix=$(opcli artifacts matrix)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # ── Job 2: build each artifact in parallel ─────────────────────────────────
  build:
    name: "Build ${{ matrix.type }} ${{ matrix.name }}"
    needs: build-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build-matrix.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install opcli
        run: |
          uv tool install "git+https://github.com/javierdelapuente/operator-ci-poc.git@${{ needs.build-matrix.outputs.opcli-sha }}"

      - name: Set up LXD
        uses: canonical/setup-lxd@main

      - name: Install charmcraft
        if: matrix.type == 'charm'
        run: sudo snap install charmcraft --classic

      - name: Install rockcraft
        if: matrix.type == 'rock'
        run: sudo snap install rockcraft --classic

      - name: Install snapcraft
        if: matrix.type == 'snap'
        run: sudo snap install snapcraft --classic

      - name: Login to GHCR
        if: matrix.type == 'rock'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Build ${{ matrix.type }} ${{ matrix.name }}
        run: opcli artifacts build --${{ matrix.type }} ${{ matrix.name }}

      - name: Upload built ${{ matrix.type }}
        if: matrix.type != 'rock'
        uses: actions/upload-artifact@v4
        with:
          name: built-${{ matrix.type }}-${{ matrix.name }}
          path: ${{ inputs.working-directory }}/**/*.${{ matrix.type }}
          if-no-files-found: error

      - name: Upload partial artifacts-generated.yaml
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-generated-${{ matrix.type }}-${{ matrix.name }}
          path: ${{ inputs.working-directory }}/artifacts-generated.yaml
          if-no-files-found: error

  # ── Job 3: merge all partials into the final artifacts-generated.yaml ───────
  collect:
    name: Collect artifacts
    needs: [build-matrix, build]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install opcli
        run: |
          uv tool install "git+https://github.com/javierdelapuente/operator-ci-poc.git@${{ needs.build-matrix.outputs.opcli-sha }}"

      - name: Download all partial artifacts-generated.yaml files
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-generated-*
          path: ${{ inputs.working-directory }}/partial-artifacts/

      - name: Merge partials
        run: |
          opcli artifacts collect \
            $(find ./partial-artifacts -name "artifacts-generated.yaml" | sort | tr '\n' ' ')

      - name: Upload merged artifacts-generated.yaml
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-generated
          path: ${{ inputs.working-directory }}/artifacts-generated.yaml
          if-no-files-found: error


