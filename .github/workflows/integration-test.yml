name: Integration Test

# Reusable workflow that:
#   1. Builds all artifacts (calls build-artifacts.yml)
#   2. Generates a spread test matrix (opcli spread tasks)
#   3. Runs each spread test task in a dedicated job
#
# Call from your operator repository:
#
#   jobs:
#     integration-test:
#       uses: javierdelapuente/operator-ci-poc/.github/workflows/integration-test.yml@main
#       permissions:
#         contents: read
#         packages: write
#         actions: read
#
# Assumptions about the operator repository layout:
#   - ``artifacts.yaml`` declares charms/rocks
#   - ``spread.yaml`` uses the ``integration-test:`` virtual backend
#   - ``tests/integration/`` contains the integration test modules

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing artifacts.yaml and spread.yaml (relative to workspace root)"
        type: string
        default: "."

jobs:
  # ── Job 1: build all artifacts ──────────────────────────────────────────────
  build:
    uses: ./.github/workflows/build-artifacts.yml
    with:
      working-directory: ${{ inputs.working-directory }}
    permissions:
      contents: read
      packages: write
      actions: read

  # ── Job 2: generate the spread test matrix ──────────────────────────────────
  # Runs in parallel with the build job — only needs spread.yaml from the repo.
  test-plan:
    name: Generate test matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      matrix: ${{ steps.tasks.outputs.matrix }}
      opcli-sha: ${{ steps.workflow-version.outputs.sha }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Get workflow version
        id: workflow-version
        uses: canonical/get-workflow-version-action@v1
        with:
          repository-name: javierdelapuente/operator-ci-poc
          file-name: integration-test.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Install opcli
        run: |
          if grep -q 'name = "opcli"' "${GITHUB_WORKSPACE}/pyproject.toml" 2>/dev/null; then
            uv tool install "${GITHUB_WORKSPACE}"
          else
            uv tool install "git+https://github.com/javierdelapuente/operator-ci-poc.git@${{ steps.workflow-version.outputs.sha }}"
          fi

      - name: Generate spread task matrix
        id: tasks
        run: |
          matrix=$(opcli spread tasks)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # ── Job 3: run each spread task ─────────────────────────────────────────────
  # Starts as soon as test-plan finishes — does NOT wait for the build job.
  # Provisioning runs in parallel with the build.  The spread _CI_PREPARE script
  # waits for and downloads the build artifacts before executing tests.
  test:
    name: "${{ matrix.name }}"
    needs: [test-plan]
    runs-on: ${{ fromJSON(matrix.runs-on) }}
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.test-plan.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup tmate session
        if: runner.debug == 1
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true
          timeout-minutes: 60

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Install opcli
        run: |
          if grep -q 'name = "opcli"' "${GITHUB_WORKSPACE}/pyproject.toml" 2>/dev/null; then
            uv tool install "${GITHUB_WORKSPACE}"
          else
            uv tool install "git+https://github.com/javierdelapuente/operator-ci-poc.git@${{ needs.test-plan.outputs.opcli-sha }}"
          fi

      # ── Install spread ────────────────────────────────────────────────────
      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
          sudo ln -sf ~/go/bin/spread /usr/local/bin/spread

      # ── Run the spread task ───────────────────────────────────────────────
      # Artifact download happens inside spread _CI_PREPARE (after provisioning).
      - name: Run spread task
        env:
          CI: "true"
          # GITHUB_TOKEN must be explicit — it is not auto-exported by Actions.
          # Spread captures it via $(HOST: echo "${GITHUB_TOKEN:-}") and the
          # _CI_PREPARE script uses it to authenticate `gh run download`.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: opcli spread run -- -vv ${{ matrix.selector }}

  # ── Job 4: spread with the local (LXD) backend ──────────────────────────────
  # Waits for build to complete, then downloads artifacts and runs spread in
  # local mode (no CI=true).  This exercises the same LXD-VM path a developer
  # would use on their workstation, but driven by CI-built artifacts.
  test-local:
    name: "Spread (local/LXD)"
    needs: [build, test-plan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup tmate session
        if: runner.debug == 1
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true
          timeout-minutes: 60

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Install opcli
        run: |
          if grep -q 'name = "opcli"' "${GITHUB_WORKSPACE}/pyproject.toml" 2>/dev/null; then
            uv tool install "${GITHUB_WORKSPACE}"
          else
            uv tool install "git+https://github.com/javierdelapuente/operator-ci-poc.git@${{ needs.test-plan.outputs.opcli-sha }}"
          fi

      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
          sudo ln -sf ~/go/bin/spread /usr/local/bin/spread

      - name: Install LXD
        run: |
          sudo snap install lxd
          sudo lxd waitready
          sudo lxd init --auto
          sudo usermod -aG lxd $USER
          sudo chmod 0666 /var/snap/lxd/common/lxd/unix.socket
          if sudo iptables -nL DOCKER-USER 2>/dev/null; then
            sudo iptables -I DOCKER-USER -i lxdbr0 -j ACCEPT
            sudo iptables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          fi
          if sudo ip6tables -nL DOCKER-USER 2>/dev/null; then
            sudo ip6tables -I DOCKER-USER -i lxdbr0 -j ACCEPT
            sudo ip6tables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          fi

      # Build is done — artifacts are guaranteed to exist; no --wait needed.
      - name: Fetch CI artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          opcli artifacts fetch \
            --run-id "${{ github.run_id }}" \
            --repo "${{ github.repository }}"

      # No CI=true → spread uses the local: backend (LXD VM).
      # _LOCAL_PREPARE inside the VM runs concierge and opcli provision load.
      - name: Run spread (local/LXD)
        run: opcli spread run -- -vv
