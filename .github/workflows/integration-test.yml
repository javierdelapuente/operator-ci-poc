name: Integration Test

# Reusable workflow that:
#   1. Builds all artifacts (calls build-artifacts.yml)
#   2. Generates a spread test matrix (opcli spread tasks)
#   3. Runs each spread test task in a dedicated job
#
# Call from your operator repository:
#
#   jobs:
#     integration-test:
#       uses: javierdelapuente/operator-ci-poc/.github/workflows/integration-test.yml@main
#       permissions:
#         contents: read
#         packages: write
#         actions: read
#
# Assumptions about the operator repository layout:
#   - ``artifacts.yaml`` declares charms/rocks
#   - ``spread.yaml`` uses the ``integration-test:`` virtual backend
#   - ``tests/integration/`` contains the integration test modules

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing artifacts.yaml and spread.yaml (relative to workspace root)"
        type: string
        default: "."

jobs:
  # ── Job 1: build all artifacts ──────────────────────────────────────────────
  build:
    uses: ./.github/workflows/build-artifacts.yml
    with:
      working-directory: ${{ inputs.working-directory }}
    permissions:
      contents: read
      packages: write
      actions: read

  # ── Job 2: generate the spread test matrix ──────────────────────────────────
  test-plan:
    name: Generate test matrix
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      matrix: ${{ steps.tasks.outputs.matrix }}
      opcli-sha: ${{ steps.workflow-version.outputs.sha }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Get workflow version
        id: workflow-version
        uses: canonical/get-workflow-version-action@v1
        with:
          repository-name: javierdelapuente/operator-ci-poc
          file-name: integration-test.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Install opcli
        run: |
          if grep -q 'name = "opcli"' "${GITHUB_WORKSPACE}/pyproject.toml" 2>/dev/null; then
            uv tool install "${GITHUB_WORKSPACE}"
          else
            uv tool install "git+https://github.com/javierdelapuente/operator-ci-poc.git@${{ steps.workflow-version.outputs.sha }}"
          fi

      - name: Generate spread task matrix
        id: tasks
        run: |
          matrix=$(opcli spread tasks)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # ── Job 3: run each spread task ─────────────────────────────────────────────
  test:
    name: "${{ matrix.name }}"
    needs: [build, test-plan]
    runs-on: ${{ fromJSON(matrix.runs-on) }}
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.test-plan.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          sudo snap install astral-uv --classic
          # Symlink into /usr/local/bin so the ubuntu spread user finds uv on PATH.
          sudo ln -sf /snap/astral-uv/current/bin/uv /usr/local/bin/uv

      - name: Install opcli
        run: |
          if grep -q 'name = "opcli"' "${GITHUB_WORKSPACE}/pyproject.toml" 2>/dev/null; then
            uv tool install "${GITHUB_WORKSPACE}"
          else
            uv tool install "git+https://github.com/javierdelapuente/operator-ci-poc.git@${{ needs.test-plan.outputs.opcli-sha }}"
          fi
          # Symlink into /usr/local/bin so the ubuntu spread user finds opcli on PATH.
          sudo ln -sf "$(command -v opcli)" /usr/local/bin/opcli

      - name: Install tox
        run: |
          uv tool install tox --with tox-uv
          # Symlink into /usr/local/bin so the ubuntu spread user finds tox on PATH.
          sudo ln -sf "$(command -v tox)" /usr/local/bin/tox

      # ── Install LXD ──────────────────────────────────────────────────────
      - name: Install LXD
        run: |
          sudo snap install lxd
          sudo lxd waitready
          sudo lxd init --auto
          sudo usermod -aG lxd $USER
          sudo chmod 0666 /var/snap/lxd/common/lxd/unix.socket
          if sudo iptables -nL DOCKER-USER 2>/dev/null; then
            sudo iptables -I DOCKER-USER -i lxdbr0 -j ACCEPT
            sudo iptables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          fi
          if sudo ip6tables -nL DOCKER-USER 2>/dev/null; then
            sudo ip6tables -I DOCKER-USER -i lxdbr0 -j ACCEPT
            sudo ip6tables -I DOCKER-USER -o lxdbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          fi

      # ── Install spread (direct binary, not snap) ──────────────────────────
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: false

      - name: Install spread
        run: go install github.com/canonical/spread/cmd/spread@latest

      # ── Install concierge ─────────────────────────────────────────────────
      - name: Install concierge
        run: sudo snap install concierge --classic

      # ── Download build artifacts ──────────────────────────────────────────
      - name: Download artifacts-generated.yaml
        uses: actions/download-artifact@v4
        with:
          name: artifacts-generated
          path: ${{ inputs.working-directory }}/

      - name: Download built charm files
        uses: actions/download-artifact@v4
        with:
          pattern: built-charm-*
          merge-multiple: true
          path: ${{ inputs.working-directory }}/

      # ── Localize charm artifact refs to downloaded files ──────────────────
      - name: Localize artifacts
        run: opcli artifacts localize

      # ── Run the spread task ───────────────────────────────────────────────
      - name: Run spread task
        env:
          CI: "true"
        run: opcli spread run -- ${{ matrix.selector }}
